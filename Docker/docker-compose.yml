version: '3.8'

# ─────────────────────────────────────────────────────────────
#  Sarvo Prayas Sansthan — Ghost CMS (development)
#
#  Usage:
#    1. cd d:\oasis\SarvoPrayas
#    2. docker compose up -d
#    3. Open http://localhost:2368/ghost  (admin setup)
#    4. Upload the theme zip OR use the volume mount below
#       to hot-reload theme changes without restarting.
#
#  Theme volume mount:
#    The host folder  ../sarvoprayas-theme  is mounted into
#    Ghost's themes directory.  Any file you save is instantly
#    reflected — no upload needed during development.
#
#  After editing templates, force-refresh in Ghost Admin:
#    Settings → Design → your theme → Activate
# ─────────────────────────────────────────────────────────────

services:
  ghost:
    image: ghost:5-alpine
    container_name: sarvoprayas_ghost
    restart: unless-stopped
    ports:
      - "2368:2368"

    environment:
      NODE_ENV: development
      url: https://sps.ngrok-free.app
      # Mail transport (set up before going live):
      # mail__transport: SMTP
      # mail__options__host: smtp.example.com
      # mail__options__port: 587
      # mail__options__auth__user: your@email.com
      # mail__options__auth__pass: yourpassword

    volumes:
      # Persist all Ghost content (posts, images, settings, SQLite DB)
      - ghost_data:/var/lib/ghost/content

      # Mount theme folder directly for live development
      - ../sarvoprayas-theme:/var/lib/ghost/content/themes/sarvoprayas-theme

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:2368/ghost/api/admin/site/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  ghost_data:
    driver: local